<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Love</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg"></div>

   <div class="lyrics">
        <div class="line">사람 사이 사람</div>
        <div class="line">바람 사이 바람</div>
        <div class="line">각자의 염원이 바래고</div>
        <div class="line">덧칠되어...</div>
        <div class="line">발이 닿을 만큼</div>
        <div class="line">굳어지면...</div>
        <div class="line">비로소 내 세상이</div>
        <div class="line">되어줘.</div>
    </div>

    <script>
        const lines = document.querySelectorAll(".line");

        const timings = [
            6500,
            6200,
            3000,
            6000,
            7700,
            6000,
            6900,
            6000
        ];

        let index = 0;

        function showLine() {
            // Remove 'active' class from all lines to hide them
            lines.forEach(line => line.classList.remove("active"));

            if (index < lines.length) {
                // Show the current line
                lines[index].classList.add("active");

                // Wait for the specific duration before showing the next line
                setTimeout(() => {
                    index++;
                    showLine();
                }, timings[index]);
            } else {
                // Loop back to the beginning after a 1-second delay
                index = 0;
                setTimeout(showLine, 1000);
            }
        }

        // Start the lyric animation
        showLine();
    </script>
</body>
</html>
